server:
  address: 127.0.0.1
  port: 8081
  servlet:
    context-path: /
  forward-headers-strategy: framework

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${PAPER_MES_DB_URL:jdbc:mysql://127.0.0.1:3306/paper_processing?useSSL=false&useUnicode=true&characterEncoding=utf8&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=false}
    username: ${PAPER_MES_DB_USER:paper_mes_app}
    password: ${PAPER_MES_DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

app:
  schema-bootstrap:
    enabled: false
  auth:
    session-hours: 12
    session-retention-days: 7
    session-cleanup-cron: "0 30 3 * * *"
    login-max-failures: 5
    login-window-seconds: 300
    login-lock-seconds: 900
    cookie-secure: true
  upload:
    dir: /opt/paper-mes/upload
    url-prefix: /api/files

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

logging:
  file:
    name: /var/log/paper-mes/app.log
  level:
    root: INFO
    com.paper.mes: INFO

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
