server:
  port: 8081
  servlet:
    context-path: /

spring:
  application:
    name: paper-mes
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

app:
  schema-bootstrap:
    enabled: ${PAPER_MES_SCHEMA_BOOTSTRAP_ENABLED:false}
  auth:
    session-hours: ${PAPER_MES_SESSION_HOURS:12}
    session-retention-days: ${PAPER_MES_SESSION_RETENTION_DAYS:7}
    session-cleanup-cron: "${PAPER_MES_SESSION_CLEANUP_CRON:0 30 3 * * *}"
    login-max-failures: ${PAPER_MES_LOGIN_MAX_FAILURES:5}
    login-window-seconds: ${PAPER_MES_LOGIN_WINDOW_SECONDS:300}
    login-lock-seconds: ${PAPER_MES_LOGIN_LOCK_SECONDS:900}
    cookie-secure: ${PAPER_MES_COOKIE_SECURE:false}
  data-health:
    back-record-overdue-days: ${PAPER_MES_BACK_RECORD_OVERDUE_DAYS:3}
    receivable-overdue-days: ${PAPER_MES_RECEIVABLE_OVERDUE_DAYS:30}
    initial-delay-ms: ${PAPER_MES_DATA_HEALTH_INITIAL_DELAY_MS:60000}
    scan-delay-ms: ${PAPER_MES_DATA_HEALTH_SCAN_DELAY_MS:900000}
  export-task:
    storage-dir: ${PAPER_MES_EXPORT_STORAGE_DIR:./data/exports}
    storage-min-free-bytes: ${PAPER_MES_EXPORT_MIN_FREE_BYTES:0}
    storage-min-free-percent: ${PAPER_MES_EXPORT_MIN_FREE_PERCENT:5}
    storage-alert-initial-delay-ms: ${PAPER_MES_EXPORT_ALERT_INITIAL_DELAY_MS:30000}
    storage-alert-check-delay-ms: ${PAPER_MES_EXPORT_ALERT_CHECK_DELAY_MS:60000}
    stale-minutes: ${PAPER_MES_EXPORT_STALE_MINUTES:10}
    heartbeat-interval-seconds: ${PAPER_MES_EXPORT_HEARTBEAT_INTERVAL_SECONDS:30}
    orphan-retention-minutes: ${PAPER_MES_EXPORT_ORPHAN_RETENTION_MINUTES:60}
    orphan-scan-limit: ${PAPER_MES_EXPORT_ORPHAN_SCAN_LIMIT:100}
    orphan-cleanup-initial-delay-ms: ${PAPER_MES_EXPORT_ORPHAN_CLEANUP_INITIAL_DELAY_MS:60000}
    orphan-cleanup-delay-ms: ${PAPER_MES_EXPORT_ORPHAN_CLEANUP_DELAY_MS:900000}
    sse-sync-delay-ms: ${PAPER_MES_EXPORT_SSE_SYNC_DELAY_MS:2000}
    executor:
      worker-count: ${PAPER_MES_EXPORT_WORKER_COUNT:2}
      queue-capacity: ${PAPER_MES_EXPORT_QUEUE_CAPACITY:50}
      shutdown-wait-seconds: ${PAPER_MES_EXPORT_SHUTDOWN_WAIT_SECONDS:5}
  upload:
    dir: ./upload
    url-prefix: /api/files
  backup:
    enabled: ${PAPER_MES_BACKUP_ENABLED:true}
    root-dir: ${PAPER_MES_BACKUP_ROOT:}
    backup-script: ${PAPER_MES_BACKUP_SCRIPT:}
    verify-script: ${PAPER_MES_VERIFY_SCRIPT:}
    env-file: ${PAPER_MES_BACKUP_ENV_FILE:}
    source-db-name: ${PAPER_MES_DB_NAME:paper_processing}
    command-timeout: ${PAPER_MES_BACKUP_TIMEOUT:30m}
    cleanup-cron: "${PAPER_MES_BACKUP_CLEANUP_CRON:0 15 3 * * *}"
    automatic-check-delay: ${PAPER_MES_BACKUP_CHECK_DELAY_MS:60000}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  global-config:
    banner: false
    db-config:
      id-type: assign_uuid
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
