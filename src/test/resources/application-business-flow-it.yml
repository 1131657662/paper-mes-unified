spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${PAPER_MES_IT_DB_URL}
    username: ${PAPER_MES_IT_DB_USERNAME}
    password: ${PAPER_MES_IT_DB_PASSWORD}
  task:
    scheduling:
      enabled: false

app:
  backup:
    enabled: false

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
