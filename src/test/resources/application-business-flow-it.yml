spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${PAPER_MES_IT_DB_URL:jdbc:mysql://localhost:3306/paper_processing_test?useSSL=false&useUnicode=true&characterEncoding=utf8&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true}
    username: ${PAPER_MES_IT_DB_USERNAME:root}
    password: ${PAPER_MES_IT_DB_PASSWORD:}
  task:
    scheduling:
      enabled: false

app:
  backup:
    enabled: false

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
