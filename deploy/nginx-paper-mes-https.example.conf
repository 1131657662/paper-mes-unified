# Install only after the certificate exists under /etc/letsencrypt/live/mes.example.com/.
limit_req_zone $binary_remote_addr zone=paper_mes_login:10m rate=10r/m;

server {
    listen 80;
    listen [::]:80;
    server_name mes.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mes.example.com;

    ssl_certificate /etc/letsencrypt/live/mes.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mes.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:paper_mes_tls:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    root /opt/paper-mes/frontend/dist;
    index index.html;
    client_max_body_size 50m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /api/auth/login {
        limit_req zone=paper_mes_login burst=5 nodelay;
        limit_req_status 429;
        include /etc/nginx/snippets/paper-mes-proxy.conf;
    }

    location /api/ {
        include /etc/nginx/snippets/paper-mes-proxy.conf;
    }

    location /files/ {
        include /etc/nginx/snippets/paper-mes-proxy.conf;
    }
}
