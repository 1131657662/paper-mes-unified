<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>纸品加工MES - 登陆页面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #E8EEF7 0%, #f0f4f9 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 1400px;
            height: 900px;
            background: #E8EEF7;
            display: flex;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
        }

        .left-section {
            flex: 1;
            padding: 60px 50px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            position: relative;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 90px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #2563EB 0%, #1d4ed8 100%);
            clip-path: polygon(50% 0%, 100% 100%, 0% 100%);
            flex-shrink: 0;
        }

        .logo-text {
            font-size: 14px;
            font-weight: 500;
            color: #1A1A1A;
        }

        .subtitle {
            font-size: 12px;
            color: #666666;
            margin-bottom: 15px;
        }

        .main-title {
            font-size: 48px;
            font-weight: 700;
            color: #1A1A1A;
            line-height: 56px;
            margin-bottom: 20px;
        }

        .main-title .highlight {
            color: #2563EB;
        }

        .description {
            font-size: 14px;
            color: #666666;
            line-height: 22px;
            margin-bottom: 100px;
            max-width: 450px;
        }

        .features {
            display: flex;
            flex-direction: column;
            gap: 60px;
            flex: 1;
        }

        .feature-item {
            display: flex;
            align-items: flex-start;
            gap: 20px;
        }

        .feature-icon {
            width: 48px;
            height: 48px;
            background: #2563EB;
            border-radius: 8px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
        }

        .feature-content {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .feature-title {
            font-size: 16px;
            font-weight: 500;
            color: #1A1A1A;
        }

        .feature-subtitle {
            font-size: 12px;
            color: #999999;
        }

        .factory-illustration {
            position: absolute;
            left: 300px;
            top: 300px;
            width: 250px;
            height: 280px;
            background: linear-gradient(135deg, rgba(212, 228, 255, 0.6) 0%, rgba(168, 213, 255, 0.6) 100%);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #2563EB;
            z-index: 1;
            box-shadow: 0 8px 24px rgba(37, 99, 235, 0.15);
            overflow: hidden;
        }

        .factory-illustration::before {
            content: '';
            position: absolute;
            width: 80%;
            height: 80%;
            border: 2px dashed rgba(37, 99, 235, 0.3);
            border-radius: 12px;
        }

        .right-section {
            width: 450px;
            padding: 60px 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .form-container {
            width: 380px;
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .security-badge {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 30px;
        }

        .security-icon {
            width: 16px;
            height: 16px;
            background: #2563EB;
            border-radius: 2px;
        }

        .security-text {
            font-size: 12px;
            color: #2563EB;
            font-weight: 500;
        }

        .form-title {
            font-size: 20px;
            font-weight: 700;
            color: #1A1A1A;
            margin-bottom: 8px;
        }

        .form-subtitle {
            font-size: 12px;
            color: #999999;
            margin-bottom: 40px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 30px;
        }

        .form-label {
            font-size: 14px;
            font-weight: 500;
            color: #1A1A1A;
            margin-bottom: 8px;
        }

        .form-label .required {
            color: #FF4444;
        }

        .form-input {
            width: 100%;
            height: 44px;
            border: 1px solid #E5E7EB;
            border-radius: 6px;
            padding: 0 12px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: #2563EB;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .form-input::placeholder {
            color: #BFBFBF;
        }

        .password-field {
            position: relative;
        }

        .password-eye {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            cursor: pointer;
            color: #999999;
            font-size: 18px;
        }

        .form-button {
            width: 100%;
            height: 44px;
            background: #2563EB;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 20px;
        }

        .form-button:hover {
            background: #1d4ed8;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        .form-button:active {
            background: #1e40af;
        }

        .form-footer {
            font-size: 12px;
            color: #999999;
            text-align: center;
            margin-top: 40px;
            display: flex;
            align-items: center;
            gap: 6px;
            justify-content: center;
        }

        .form-footer::before {
            content: '✓';
            color: #16a34a;
            font-weight: bold;
        }

        /* 响应式调整 */
        @media (max-width: 1400px) {
            .container {
                width: 100%;
                height: auto;
                flex-direction: column;
            }

            .right-section {
                width: 100%;
            }

            .factory-illustration {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 左侧部分 -->
        <div class="left-section">
            <!-- Logo -->
            <div class="logo-area">
                <div class="logo-icon"></div>
                <div class="logo-text">纸品加工工 MES</div>
            </div>

            <!-- 标题区 -->
            <div class="subtitle">Paper Processing SaaS</div>
            <div class="main-title">
                让生产、出库、结算<br>在同一个工作台里<span class="highlight">闭环</span>
            </div>
            <div class="description">
                面向卷筒纸加工现场，聚合工艺配置、机台作业、卷号追踪、出库签收和加工应收。
            </div>

            <!-- 功能特性 -->
            <div class="features">
                <div class="feature-item">
                    <div class="feature-icon">⚙️</div>
                    <div class="feature-content">
                        <div class="feature-title">加工闭环</div>
                        <div class="feature-subtitle">工艺配置 / 套号追踪</div>
                    </div>
                </div>

                <div class="feature-item">
                    <div class="feature-icon">👥</div>
                    <div class="feature-content">
                        <div class="feature-title">现场协同</div>
                        <div class="feature-subtitle">机台作业 / 生产回象</div>
                    </div>
                </div>

                <div class="feature-item">
                    <div class="feature-icon">📈</div>
                    <div class="feature-content">
                        <div class="feature-title">经营分析</div>
                        <div class="feature-subtitle">应收金额 / 产出趋势</div>
                    </div>
                </div>

                <div class="feature-item">
                    <div class="feature-icon">🛡️</div>
                    <div class="feature-content">
                        <div class="feature-title">业务闭环</div>
                        <div class="feature-subtitle">从开票到结算，数据留痕可溯源</div>
                    </div>
                </div>
            </div>

            <!-- 3D工厂插画 -->
            <div class="factory-illustration">
                3D 工厂示意图
            </div>
        </div>

        <!-- 右侧部分 -->
        <div class="right-section">
            <div class="form-container">
                <!-- 安全登录标签 -->
                <div class="security-badge">
                    <div class="security-icon"></div>
                    <div class="security-text">安全登录</div>
                </div>

                <!-- 表单标题 -->
                <div class="form-title">登录生产系统</div>
                <div class="form-subtitle">使用系统账号进入工作台</div>

                <!-- 用户名输入 -->
                <div class="form-group">
                    <label class="form-label">
                        <span class="required">*</span>用户名
                    </label>
                    <input type="text" class="form-input" placeholder="请输入入用户名">
                </div>

                <!-- 密码输入 -->
                <div class="form-group">
                    <label class="form-label">
                        <span class="required">*</span>密码
                    </label>
                    <div class="password-field">
                        <input type="password" class="form-input" placeholder="请输入入密码">
                        <div class="password-eye">👁️</div>
                    </div>
                </div>

                <!-- 登录按钮 -->
                <button class="form-button">登录</button>

                <!-- 底部说明 -->
                <div class="form-footer">忘记密码请联系系统管理员</div>
            </div>
        </div>
    </div>
</body>
</html>
